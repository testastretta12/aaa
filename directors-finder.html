<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Directors Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --bg: #080a0d;
    --surface: #0f1318;
    --surface2: #151b22;
    --border: #1c2530;
    --accent: #5aacff;
    --accent-dim: rgba(90,172,255,0.12);
    --accent-glow: rgba(90,172,255,0.25);
    --text: #b8c8d8;
    --text-dim: #48586a;
    --text-bright: #ddeeff;
    --red: #ff5a5a;
    --red-dim: rgba(255,90,90,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* ── Layout: camera left, panel right ── */
  #app {
    width: 100dvw;
    height: 100dvh;
    display: flex;
    flex-direction: row;
  }

  /* Camera area */
  #camArea {
    position: relative;
    flex: 1;
    background: #000;
    overflow: hidden;
  }
  #camVideo {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }
  #overlayCanvas {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #camPlaceholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; opacity: 0.28;
  }
  .ph-icon {
    width: 52px; height: 40px;
    border: 1.5px solid var(--text-dim);
    border-radius: 6px; position: relative;
  }
  .ph-icon::before {
    content: ''; position: absolute;
    top: -9px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 8px;
    border: 1.5px solid var(--text-dim);
    border-radius: 3px 3px 0 0; border-bottom: none;
  }
  .ph-icon::after {
    content: ''; position: absolute; inset: 7px;
    border-radius: 50%; border: 1.5px solid var(--text-dim);
  }
  #camPlaceholder p { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; }

  /* Flash overlay for shutter */
  #flashOverlay {
    position: absolute; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s;
    z-index: 20;
  }

  /* ── Right panel ── */
  #panel {
    width: 200px;
    flex-shrink: 0;
    background: rgba(8,10,13,0.96);
    backdrop-filter: blur(24px) saturate(1.5);
    -webkit-backdrop-filter: blur(24px) saturate(1.5);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 14px 14px 18px;
    gap: 14px;
    overflow-y: auto;
  }

  /* Title */
  .app-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Cam controls row */
  .cam-row { display: flex; gap: 6px; align-items: center; }

  #camBtn {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 8px 0;
    cursor: pointer; transition: all 0.18s;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 300;
    font-size: 11px; color: var(--text);
  }
  #camBtn.active { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .cam-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-dim); transition: all 0.18s; flex-shrink: 0;
  }
  #camBtn.active .cam-dot {
    background: var(--red);
    box-shadow: 0 0 5px var(--red);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #switchBtn {
    display: none;
    align-items: center; justify-content: center;
    width: 34px; height: 34px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; cursor: pointer; color: var(--text-dim);
    transition: all 0.15s; flex-shrink: 0;
  }
  #switchBtn.visible { display: flex; }
  #switchBtn:active { color: var(--accent); border-color: var(--accent); }

  /* Section label */
  .sec-label {
    font-size: 9px; letter-spacing: 0.15em;
    color: var(--text-dim); text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* Sensor tabs — vertical */
  .sensor-tabs { display: flex; flex-direction: column; gap: 5px; }
  .s-tab {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; padding: 8px 10px;
    cursor: pointer; transition: all 0.14s;
    display: flex; flex-direction: column; gap: 2px;
  }
  .s-tab .tn { font-size: 11px; color: var(--text); font-weight: 400; }
  .s-tab .td { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text-dim); }
  .s-tab.active { background: var(--accent-dim); border-color: var(--accent); }
  .s-tab.active .tn { color: var(--accent); }
  .s-tab.active .td { color: rgba(90,172,255,0.5); }

  /* Focal */
  .focal-block { display: flex; flex-direction: column; gap: 6px; }
  .focal-val-row { display: flex; align-items: baseline; justify-content: space-between; }
  .fv {
    font-family: 'DM Mono', monospace; font-size: 26px;
    font-weight: 300; color: var(--text-bright); line-height: 1;
  }
  .fv em { font-style: normal; font-size: 12px; color: var(--text-dim); margin-left: 2px; }

  /* Vertical slider */
  .vslider-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 0 2px;
  }
  /* Horizontal slider — fits panel width */
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 2px;
    background: transparent; outline: none; cursor: pointer;
    position: relative; z-index: 2;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 2px; background: var(--border); border-radius: 1px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 10px var(--accent-glow);
    margin-top: -10px; cursor: pointer;
  }
  input[type=range]:active::-webkit-slider-thumb { box-shadow: 0 0 18px var(--accent-glow); }

  .slider-row { position: relative; height: 30px; display: flex; align-items: center; }
  .track-fill {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    height: 2px; background: var(--accent); border-radius: 1px;
    pointer-events: none; z-index: 1;
  }

  /* Tick marks — small, 2 columns for space */
  .tick-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px 0;
    width: 100%;
  }
  .tick {
    font-family: 'DM Mono', monospace; font-size: 7px;
    color: var(--text-dim); cursor: pointer;
    padding: 2px 0; text-align: center;
    transition: color 0.12s; user-select: none;
    white-space: nowrap; overflow: hidden;
  }
  .tick.active { color: var(--accent); }

  /* Aspect tabs — 2×2 grid */
  .aspect-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
  }
  .a-tab {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 5px; padding: 7px 0;
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--text-dim); cursor: pointer;
    transition: all 0.12s; text-align: center;
  }
  .a-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* FOV readout */
  .fov-stack { display: flex; flex-direction: column; gap: 5px; }
  .fov-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 5px; padding: 6px 10px;
  }
  .fi-l { font-size: 8px; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; }
  .fi-v { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent); font-weight: 400; }

  /* Shutter */
  #shutterBtn {
    margin-top: auto;
    width: 100%; height: 54px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.15s; color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif; font-weight: 300; font-size: 12px;
  }
  #shutterBtn.ready {
    background: rgba(90,172,255,0.1); border-color: var(--accent);
    color: var(--text-bright);
  }
  #shutterBtn:active.ready {
    background: rgba(90,172,255,0.25);
  }
  .shutter-circle {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .shutter-circle::after {
    content: ''; width: 18px; height: 18px;
    border-radius: 50%; background: currentColor;
  }

  /* Save feedback */
  #saveFeedback {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(8,10,13,0.92); border: 1px solid var(--border);
    border-radius: 20px; padding: 8px 18px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent);
    letter-spacing: 0.08em; opacity: 0; pointer-events: none;
    transition: opacity 0.3s; z-index: 100;
  }

  #camError {
    font-size: 10px; color: var(--red); line-height: 1.7;
    padding: 8px; background: var(--red-dim);
    border: 1px solid rgba(255,90,90,0.3); border-radius: 6px;
    display: none;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Camera area -->
  <div id="camArea">
    <div id="camPlaceholder">
      <div class="ph-icon"></div>
      <p>カメラを起動する</p>
    </div>
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div id="flashOverlay"></div>
  </div>

  <!-- Right panel -->
  <div id="panel">
    <span class="app-title">Directors Finder</span>

    <!-- Camera controls -->
    <div>
      <div class="sec-label">カメラ</div>
      <div class="cam-row">
        <button id="camBtn">
          <span class="cam-dot"></span>
          <span id="camLabel">起動</span>
        </button>
        <button id="switchBtn" title="カメラ切替">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
      </div>
      <div id="camError" style="margin-top:8px"></div>
    </div>

    <!-- Sensor -->
    <div>
      <div class="sec-label">センサー</div>
      <div class="sensor-tabs" id="sensorTabs">
        <div class="s-tab active" data-id="ff">
          <span class="tn">フルサイズ</span>
          <span class="td">36.0 × 24.0 mm</span>
        </div>
        <div class="s-tab" data-id="apsc">
          <span class="tn">APS-C</span>
          <span class="td">23.5 × 15.6 mm</span>
        </div>
      </div>
    </div>

    <!-- Focal -->
    <div class="focal-block">
      <div class="sec-label">焦点距離</div>
      <div class="focal-val-row">
        <div class="fv"><span id="fDisp">200</span><em>mm</em></div>
      </div>
      <div class="slider-row">
        <div class="track-fill" id="trackFill"></div>
        <input type="range" id="fSlider" min="0" step="1" value="9">
      </div>
      <div class="tick-grid" id="tickGrid"></div>
    </div>

    <!-- Aspect -->
    <div>
      <div class="sec-label">アスペクト比</div>
      <div class="aspect-grid" id="aspectTabs">
        <div class="a-tab active" data-ar="3:2">3:2</div>
        <div class="a-tab" data-ar="1:1">1:1</div>
        <div class="a-tab" data-ar="16:9">16:9</div>
        <div class="a-tab" data-ar="21:9">21:9</div>
      </div>
    </div>

    <!-- FOV -->
    <div>
      <div class="sec-label">画角</div>
      <div class="fov-stack">
        <div class="fov-item"><span class="fi-l">水平</span><span class="fi-v" id="hFov">—</span></div>
        <div class="fov-item"><span class="fi-l">垂直</span><span class="fi-v" id="vFov">—</span></div>
        <div class="fov-item"><span class="fi-l">対角</span><span class="fi-v" id="dFov">—</span></div>
      </div>
    </div>

    <!-- Shutter -->
    <button id="shutterBtn">
      <div class="shutter-circle"></div>
      撮影
    </button>
  </div>
</div>

<div id="saveFeedback">保存しました</div>

<script>
const SENSORS = {
  ff:   { w: 36.0, h: 24.0, label: 'FF 36×24mm' },
  apsc: { w: 23.5, h: 15.6, label: 'APS-C 23.5×15.6mm' },
};
const STEPS = [20,24,28,35,50,58,85,105,135,200,300,400,500,600];
const ASPECTS = { '3:2':[3,2], '1:1':[1,1], '16:9':[16,9], '21:9':[21,9] };

let sensor = 'ff';
let fIdx = 9;
let ar = '3:2';
let stream = null;
let raf = null;
let cameras = [];
let camIdx = 0;

// ── Slider + ticks ──
const slider = document.getElementById('fSlider');
slider.max = STEPS.length - 1;
slider.value = fIdx;

const tickGrid = document.getElementById('tickGrid');
STEPS.forEach((f, i) => {
  const t = document.createElement('div');
  t.className = 'tick' + (i === fIdx ? ' active' : '');
  t.textContent = f;
  t.addEventListener('click', () => setFocal(i));
  tickGrid.appendChild(t);
});

function setFocal(i) {
  fIdx = i;
  slider.value = i;
  document.getElementById('fDisp').textContent = STEPS[i];
  document.querySelectorAll('.tick').forEach((t, j) => t.classList.toggle('active', j === i));
  updateFill(); calc(); draw();
}
function updateFill() {
  document.getElementById('trackFill').style.width = (fIdx / (STEPS.length - 1) * 100) + '%';
}
slider.addEventListener('input', () => setFocal(+slider.value));

// ── Sensor ──
document.getElementById('sensorTabs').addEventListener('click', e => {
  const tab = e.target.closest('.s-tab');
  if (!tab) return;
  sensor = tab.dataset.id;
  document.querySelectorAll('.s-tab').forEach(t => t.classList.toggle('active', t === tab));
  calc(); draw();
});

// ── Aspect ──
document.getElementById('aspectTabs').addEventListener('click', e => {
  const tab = e.target.closest('.a-tab');
  if (!tab) return;
  ar = tab.dataset.ar;
  document.querySelectorAll('.a-tab').forEach(t => t.classList.toggle('active', t === tab));
  draw();
});

// ── FOV ──
function fov(dim, f) {
  return (2 * Math.atan(dim / (2 * f)) * 180 / Math.PI).toFixed(1);
}
function calc() {
  const f = STEPS[fIdx];
  const s = SENSORS[sensor];
  document.getElementById('hFov').textContent = fov(s.w, f);
  document.getElementById('vFov').textContent = fov(s.h, f);
  document.getElementById('dFov').textContent = fov(Math.hypot(s.w, s.h), f);
}

// ── Camera ──
document.getElementById('camBtn').addEventListener('click', () => { stream ? stop() : startCam(); });
document.getElementById('switchBtn').addEventListener('click', () => {
  if (cameras.length < 2) return;
  camIdx = (camIdx + 1) % cameras.length;
  restartWithDevice(cameras[camIdx].deviceId);
});

// Filter only rear cameras
function isRearCamera(device) {
  const label = (device.label || '').toLowerCase();
  // Exclude front/selfie cameras
  if (label.includes('front') || label.includes('selfie') || label.includes('user') || label.includes('facetime')) return false;
  return true;
}

async function enumerateCameras() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const all = devices.filter(d => d.kind === 'videoinput');
    const rear = all.filter(isRearCamera);
    // Fallback: if filter removes everything, use all
    cameras = rear.length > 0 ? rear : all;
    const sw = document.getElementById('switchBtn');
    cameras.length > 1 ? sw.classList.add('visible') : sw.classList.remove('visible');
  } catch { cameras = []; }
}

async function startCam() {
  document.getElementById('camError').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 } },
      audio: false
    });
    await afterStreamStart();
    await enumerateCameras();
    const track = stream.getVideoTracks()[0];
    const settings = track.getSettings();
    const idx = cameras.findIndex(c => c.deviceId === settings.deviceId);
    camIdx = idx >= 0 ? idx : 0;
  } catch {
    showError('カメラへのアクセスが許可されていません。ブラウザの設定でカメラを許可してください。');
  }
}

async function restartWithDevice(deviceId) {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  cancelAnimationFrame(raf); raf = null;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: deviceId }, width: { ideal: 1920 } },
      audio: false
    });
    await afterStreamStart();
  } catch {
    showError('カメラの切り替えに失敗しました。');
  }
}

function showError(msg) {
  const e = document.getElementById('camError');
  e.style.display = 'block'; e.textContent = msg;
}

async function afterStreamStart() {
  const v = document.getElementById('camVideo');
  v.srcObject = stream; v.style.display = 'block';
  document.getElementById('camPlaceholder').style.display = 'none';
  document.getElementById('camBtn').classList.add('active');
  document.getElementById('camLabel').textContent = '停止';
  document.getElementById('shutterBtn').classList.add('ready');
  return new Promise(res => {
    v.onloadedmetadata = () => { resize(); raf = requestAnimationFrame(loop); res(); };
  });
}

function stop() {
  stream?.getTracks().forEach(t => t.stop()); stream = null;
  cancelAnimationFrame(raf); raf = null;
  const v = document.getElementById('camVideo');
  v.srcObject = null; v.style.display = 'none';
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('camBtn').classList.remove('active');
  document.getElementById('camLabel').textContent = '起動';
  document.getElementById('switchBtn').classList.remove('visible');
  document.getElementById('shutterBtn').classList.remove('ready');
  const c = document.getElementById('overlayCanvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function resize() {
  const c = document.getElementById('overlayCanvas');
  c.width = document.getElementById('camArea').offsetWidth;
  c.height = document.getElementById('camArea').offsetHeight;
}
window.addEventListener('resize', () => { if (stream) { resize(); draw(); } });
function loop() { draw(); raf = requestAnimationFrame(loop); }

// ── Shutter ──
document.getElementById('shutterBtn').addEventListener('click', async () => {
  if (!stream) return;

  // Flash
  const flash = document.getElementById('flashOverlay');
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 80);

  // Capture: draw video frame + data overlay onto offscreen canvas
  const video = document.getElementById('camVideo');
  const vw = video.videoWidth, vh = video.videoHeight;
  const off = document.createElement('canvas');
  off.width = vw; off.height = vh;
  const octx = off.getContext('2d');

  // Video frame
  octx.drawImage(video, 0, 0, vw, vh);

  // Data burn-in — bottom left corner
  const f = STEPS[fIdx];
  const s = SENSORS[sensor];
  const hf = fov(s.w, f);
  const vf = fov(s.h, f);
  const df = fov(Math.hypot(s.w, s.h), f);

  const lines = [
    `${s.label}`,
    `${f}mm  |  ${ar}`,
    `H ${hf}°  V ${vf}°  D ${df}°`,
  ];

  const fontSize = Math.round(vh * 0.022);
  const pad = Math.round(vh * 0.018);
  const lineH = Math.round(fontSize * 1.55);
  const blockH = lineH * lines.length + pad * 2;
  const blockW = vw * 0.46;
  const bx = pad;
  const by = vh - blockH - pad;

  // Background
  octx.fillStyle = 'rgba(0,0,0,0.55)';
  octx.beginPath();
  const r = 6;
  octx.moveTo(bx+r, by);
  octx.lineTo(bx+blockW-r, by); octx.arcTo(bx+blockW, by, bx+blockW, by+r, r);
  octx.lineTo(bx+blockW, by+blockH-r); octx.arcTo(bx+blockW, by+blockH, bx+blockW-r, by+blockH, r);
  octx.lineTo(bx+r, by+blockH); octx.arcTo(bx, by+blockH, bx, by+blockH-r, r);
  octx.lineTo(bx, by+r); octx.arcTo(bx, by, bx+r, by, r);
  octx.closePath(); octx.fill();

  // Text
  octx.font = `300 ${fontSize}px "DM Mono", monospace`;
  octx.fillStyle = 'rgba(90,172,255,0.9)';
  lines.forEach((line, i) => {
    octx.fillText(line, bx + pad, by + pad + fontSize + i * lineH);
  });

  // Download as image
  off.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const now = new Date();
    const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
    a.download = `df_${f}mm_${ts}.jpg`;
    a.click();
    URL.revokeObjectURL(url);
    // Feedback
    const fb = document.getElementById('saveFeedback');
    fb.style.opacity = '1';
    setTimeout(() => { fb.style.opacity = '0'; }, 1800);
  }, 'image/jpeg', 0.92);
});

// ── Draw overlay ──
function draw() {
  if (!stream) return;
  const c = document.getElementById('overlayCanvas');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);

  const f = STEPS[fIdx];
  const s = SENSORS[sensor];
  const camHFov = 65;
  const tHFov = parseFloat(fov(s.w, f));
  const clipped = tHFov >= camHFov * 0.97;
  const hRatio = Math.min(tHFov / camHFov, 0.97);

  // Base 3:2 frame
  let bW = W * hRatio;
  let bH = bW * 2 / 3;
  if (bH > H * 0.9) { bH = H * 0.9; bW = bH * 3 / 2; }
  const bX = (W - bW) / 2;
  const bY = (H - bH) / 2;

  // Crop frame
  const [arW, arH] = ASPECTS[ar];
  const selAr = arW / arH;
  let cW, cH;
  if (selAr >= 3/2) { cW = bW; cH = bW / selAr; }
  else              { cH = bH; cW = bH * selAr; }
  const cX = bX + (bW - cW) / 2;
  const cY = bY + (bH - cH) / 2;

  // Dim outside base
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,W,bY);
  ctx.fillRect(0,bY+bH,W,H-bY-bH);
  ctx.fillRect(0,bY,bX,bH);
  ctx.fillRect(bX+bW,bY,W-bX-bW,bH);

  // Crop mask
  if (ar !== '3:2') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    if (cY > bY) ctx.fillRect(bX, bY, bW, cY-bY);
    if (cY+cH < bY+bH) ctx.fillRect(bX, cY+cH, bW, (bY+bH)-(cY+cH));
    if (cX > bX) ctx.fillRect(bX, cY, cX-bX, cH);
    if (cX+cW < bX+bW) ctx.fillRect(cX+cW, cY, (bX+bW)-(cX+cW), cH);

    // Ghost 3:2 border
    ctx.strokeStyle = 'rgba(90,172,255,0.14)';
    ctx.lineWidth = 1; ctx.setLineDash([4,5]);
    ctx.strokeRect(bX, bY, bW, bH);
    ctx.setLineDash([]);
  }

  const fc = clipped ? 'rgba(255,90,90,0.9)' : 'rgba(90,172,255,0.85)';
  const gc = clipped ? 'rgba(255,90,90,0.3)'  : 'rgba(90,172,255,0.28)';

  // Active frame
  ctx.strokeStyle = fc; ctx.lineWidth = 1.5;
  ctx.shadowColor = gc; ctx.shadowBlur = 8;
  ctx.strokeRect(cX, cY, cW, cH);
  ctx.shadowBlur = 0;

  // Corner brackets
  const cs = Math.min(cW, cH) * 0.1;
  ctx.lineWidth = 3; ctx.shadowColor = gc; ctx.shadowBlur = 12;
  [[cX,cY,1,1],[cX+cW,cY,-1,1],[cX,cY+cH,1,-1],[cX+cW,cY+cH,-1,-1]].forEach(([x,y,dx,dy])=>{
    ctx.beginPath();
    ctx.moveTo(x+dx*cs, y); ctx.lineTo(x,y); ctx.lineTo(x, y+dy*cs);
    ctx.stroke();
  });
  ctx.shadowBlur = 0;

  // Rule of thirds
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 0.8;
  for (let i=1;i<=2;i++){
    ctx.beginPath(); ctx.moveTo(cX+cW*i/3,cY); ctx.lineTo(cX+cW*i/3,cY+cH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cX,cY+cH*i/3); ctx.lineTo(cX+cW,cY+cH*i/3); ctx.stroke();
  }

  // Center cross
  const cx=cX+cW/2, cy=cY+cH/2, cl=10;
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx-cl,cy); ctx.lineTo(cx+cl,cy);
  ctx.moveTo(cx,cy-cl); ctx.lineTo(cx,cy+cl); ctx.stroke();

  // Label
  ctx.fillStyle = clipped ? 'rgba(255,90,90,0.85)' : 'rgba(90,172,255,0.72)';
  ctx.font = '11px "DM Mono", monospace';
  ctx.textAlign = 'center';
  const lbl = clipped
    ? `${tHFov.toFixed(1)}° — 画角がカメラより広い`
    : `${tHFov.toFixed(1)}°  ${ar}`;
  ctx.fillText(lbl, cX+cW/2, cY-9);
}

// Init
updateFill(); calc();
</script>
