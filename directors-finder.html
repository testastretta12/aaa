<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Directors Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --bg: #080a0d;
    --surface: #0f1318;
    --surface2: #151b22;
    --border: #1c2530;
    --accent: #5aacff;
    --accent-dim: rgba(90,172,255,0.12);
    --accent-glow: rgba(90,172,255,0.25);
    --text: #b8c8d8;
    --text-dim: #48586a;
    --text-bright: #ddeeff;
    --red: #ff5a5a;
    --red-dim: rgba(255,90,90,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  #app {
    width: 100dvw;
    height: 100dvh;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Camera layer */
  #camLayer {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 0;
  }
  #camVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  #overlayCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #camPlaceholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    opacity: 0.3;
  }
  .ph-icon {
    width: 52px; height: 40px;
    border: 1.5px solid var(--text-dim);
    border-radius: 6px;
    position: relative;
  }
  .ph-icon::before {
    content: '';
    position: absolute;
    top: -9px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 8px;
    border: 1.5px solid var(--text-dim);
    border-radius: 3px 3px 0 0;
    border-bottom: none;
  }
  .ph-icon::after {
    content: '';
    position: absolute;
    inset: 7px;
    border-radius: 50%;
    border: 1.5px solid var(--text-dim);
  }
  #camPlaceholder p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* Panel */
  #panel {
    position: relative;
    z-index: 10;
    margin-top: auto;
    background: rgba(8,10,13,0.93);
    backdrop-filter: blur(24px) saturate(1.5);
    -webkit-backdrop-filter: blur(24px) saturate(1.5);
    border-top: 1px solid var(--border);
    padding: 14px 18px 22px;
    display: flex;
    flex-direction: column;
    gap: 13px;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  #camBtn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    font-size: 12px;
    color: var(--text);
  }
  #camBtn.active {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
  }
  .cam-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.18s;
    flex-shrink: 0;
  }
  #camBtn.active .cam-dot {
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* Sensor */
  .sensor-tabs { display: flex; gap: 6px; }
  .s-tab {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 0;
    cursor: pointer;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: all 0.14s;
  }
  .s-tab .tn { font-size: 12px; color: var(--text); font-weight: 400; }
  .s-tab .td { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-dim); }
  .s-tab.active { background: var(--accent-dim); border-color: var(--accent); }
  .s-tab.active .tn { color: var(--accent); }
  .s-tab.active .td { color: rgba(90,172,255,0.5); }

  /* Focal */
  .focal-block { display: flex; flex-direction: column; gap: 8px; }
  .focal-hdr {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .fl { font-size: 9px; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; }
  .fv {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 300;
    color: var(--text-bright);
    line-height: 1;
  }
  .fv em { font-style: normal; font-size: 13px; color: var(--text-dim); margin-left: 3px; }

  .slider-wrap { position: relative; height: 34px; display: flex; align-items: center; }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: transparent;
    outline: none;
    cursor: pointer;
    position: relative;
    z-index: 2;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
    margin-top: -11px;
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  input[type=range]:active::-webkit-slider-thumb {
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .track-fill {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
    pointer-events: none;
    z-index: 1;
  }

  .tick-row { display: flex; justify-content: space-between; padding: 0 2px; }
  .tick {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 3px 1px;
    transition: color 0.12s;
    user-select: none;
  }
  .tick.active { color: var(--accent); }

  /* Bottom row */
  .bottom-row { display: flex; align-items: center; gap: 10px; }
  .aspect-tabs { display: flex; gap: 5px; flex-shrink: 0; }
  .a-tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px 9px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .a-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .fov-display { flex: 1; display: flex; gap: 6px; justify-content: flex-end; }
  .fov-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 8px;
    min-width: 46px;
  }
  .fi-l { font-size: 8px; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; }
  .fi-v { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent); font-weight: 400; }

  #camError {
    display: none;
    padding: 9px 12px;
    background: var(--red-dim);
    border: 1px solid rgba(255,90,90,0.3);
    border-radius: 6px;
    font-size: 11px;
    color: var(--red);
    line-height: 1.7;
  }
</style>
</head>
<body>
<div id="app">

  <div id="camLayer">
    <div id="camPlaceholder">
      <div class="ph-icon"></div>
      <p>カメラを起動する</p>
    </div>
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
  </div>

  <div id="panel">

    <div class="top-bar">
      <span class="app-title">Directors Finder</span>
      <button id="camBtn">
        <span class="cam-dot"></span>
        <span id="camLabel">カメラ起動</span>
      </button>
    </div>

    <div class="sensor-tabs" id="sensorTabs">
      <div class="s-tab active" data-id="ff">
        <span class="tn">フルサイズ</span>
        <span class="td">36.0 × 24.0 mm</span>
      </div>
      <div class="s-tab" data-id="apsc">
        <span class="tn">APS-C</span>
        <span class="td">23.5 × 15.6 mm</span>
      </div>
    </div>

    <div class="focal-block">
      <div class="focal-hdr">
        <span class="fl">焦点距離</span>
        <div class="fv"><span id="fDisp">200</span><em>mm</em></div>
      </div>
      <div class="slider-wrap">
        <div class="track-fill" id="trackFill"></div>
        <input type="range" id="fSlider" min="0" step="1" value="9">
      </div>
      <div class="tick-row" id="tickRow"></div>
    </div>

    <div class="bottom-row">
      <div class="aspect-tabs" id="aspectTabs">
        <div class="a-tab active" data-ar="3:2">3:2</div>
        <div class="a-tab" data-ar="1:1">1:1</div>
        <div class="a-tab" data-ar="16:9">16:9</div>
        <div class="a-tab" data-ar="21:9">21:9</div>
      </div>
      <div class="fov-display">
        <div class="fov-item"><span class="fi-l">水平</span><span class="fi-v" id="hFov">—</span></div>
        <div class="fov-item"><span class="fi-l">垂直</span><span class="fi-v" id="vFov">—</span></div>
        <div class="fov-item"><span class="fi-l">対角</span><span class="fi-v" id="dFov">—</span></div>
      </div>
    </div>

    <div id="camError"></div>
  </div>
</div>

<script>
const SENSORS = {
  ff:   { w: 36.0, h: 24.0 },
  apsc: { w: 23.5, h: 15.6 },
};
const STEPS = [20,24,28,35,50,58,85,105,135,200,300,400,500,600];
const ASPECTS = { '1:1':[1,1], '3:2':[3,2], '16:9':[16,9], '21:9':[21,9] };

let sensor = 'ff';
let fIdx = 9;
let ar = '3:2';
let stream = null;
let raf = null;

// Slider setup
const slider = document.getElementById('fSlider');
slider.max = STEPS.length - 1;
slider.value = fIdx;

// Ticks
const tickRow = document.getElementById('tickRow');
STEPS.forEach((f, i) => {
  const t = document.createElement('div');
  t.className = 'tick' + (i === fIdx ? ' active' : '');
  t.textContent = f;
  t.addEventListener('click', () => setFocal(i));
  tickRow.appendChild(t);
});

function setFocal(i) {
  fIdx = i;
  slider.value = i;
  document.getElementById('fDisp').textContent = STEPS[i];
  document.querySelectorAll('.tick').forEach((t, j) => t.classList.toggle('active', j === i));
  updateFill();
  calc();
  draw();
}

function updateFill() {
  const pct = fIdx / (STEPS.length - 1) * 100;
  document.getElementById('trackFill').style.width = pct + '%';
}

slider.addEventListener('input', () => setFocal(+slider.value));

// Sensor
document.getElementById('sensorTabs').addEventListener('click', e => {
  const tab = e.target.closest('.s-tab');
  if (!tab) return;
  sensor = tab.dataset.id;
  document.querySelectorAll('.s-tab').forEach(t => t.classList.toggle('active', t === tab));
  calc(); draw();
});

// Aspect
document.getElementById('aspectTabs').addEventListener('click', e => {
  const tab = e.target.closest('.a-tab');
  if (!tab) return;
  ar = tab.dataset.ar;
  document.querySelectorAll('.a-tab').forEach(t => t.classList.toggle('active', t === tab));
  draw();
});

// FOV
function fov(dim, f) {
  return (2 * Math.atan(dim / (2 * f)) * 180 / Math.PI).toFixed(1);
}
function calc() {
  const f = STEPS[fIdx];
  const s = SENSORS[sensor];
  document.getElementById('hFov').textContent = fov(s.w, f);
  document.getElementById('vFov').textContent = fov(s.h, f);
  document.getElementById('dFov').textContent = fov(Math.hypot(s.w, s.h), f);
}

// Camera
document.getElementById('camBtn').addEventListener('click', () => {
  stream ? stop() : start();
});

async function start() {
  document.getElementById('camError').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 } },
      audio: false
    });
    const v = document.getElementById('camVideo');
    v.srcObject = stream;
    v.style.display = 'block';
    document.getElementById('camPlaceholder').style.display = 'none';
    const btn = document.getElementById('camBtn');
    btn.classList.add('active');
    document.getElementById('camLabel').textContent = 'カメラ停止';
    v.onloadedmetadata = () => { resize(); raf = requestAnimationFrame(loop); };
  } catch {
    const e = document.getElementById('camError');
    e.style.display = 'block';
    e.textContent = 'カメラへのアクセスが許可されていません。ブラウザの設定でカメラを許可してください。';
  }
}

function stop() {
  stream?.getTracks().forEach(t => t.stop());
  stream = null;
  cancelAnimationFrame(raf); raf = null;
  const v = document.getElementById('camVideo');
  v.srcObject = null; v.style.display = 'none';
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('camBtn').classList.remove('active');
  document.getElementById('camLabel').textContent = 'カメラ起動';
  const c = document.getElementById('overlayCanvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function resize() {
  const c = document.getElementById('overlayCanvas');
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
window.addEventListener('resize', () => { if (stream) { resize(); draw(); } });

function loop() { draw(); raf = requestAnimationFrame(loop); }

function draw() {
  if (!stream) return;
  const c = document.getElementById('overlayCanvas');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);

  const f = STEPS[fIdx];
  const s = SENSORS[sensor];
  const camHFov = 65; // typical smartphone rear ~26mm equiv
  const tHFov = parseFloat(fov(s.w, f));
  const [arW, arH] = ASPECTS[ar];
  const clipped = tHFov >= camHFov * 0.97;
  const hRatio = Math.min(tHFov / camHFov, 0.97);

  const panel = document.getElementById('panel');
  const pH = panel.offsetHeight;
  const availH = H - pH;

  let bW = W * hRatio;
  let bH = bW * arH / arW;
  if (bH > availH * 0.9) { bH = availH * 0.9; bW = bH * arW / arH; }

  const bX = (W - bW) / 2;
  const bY = (availH - bH) / 2;

  // Dim
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,W,bY);
  ctx.fillRect(0,bY+bH,W,availH-bY-bH);
  ctx.fillRect(0,bY,bX,bH);
  ctx.fillRect(bX+bW,bY,W-bX-bW,bH);

  const fc = clipped ? 'rgba(255,90,90,0.9)' : 'rgba(90,172,255,0.85)';
  const gc = clipped ? 'rgba(255,90,90,0.35)' : 'rgba(90,172,255,0.3)';

  // Frame
  ctx.strokeStyle = fc; ctx.lineWidth = 1.5;
  ctx.shadowColor = gc; ctx.shadowBlur = 8;
  ctx.strokeRect(bX, bY, bW, bH);
  ctx.shadowBlur = 0;

  // Corners
  const cs = Math.min(bW,bH) * 0.1;
  ctx.lineWidth = 3; ctx.shadowColor = gc; ctx.shadowBlur = 14;
  [[bX,bY,1,1],[bX+bW,bY,-1,1],[bX,bY+bH,1,-1],[bX+bW,bY+bH,-1,-1]].forEach(([x,y,dx,dy])=>{
    ctx.beginPath();
    ctx.moveTo(x+dx*cs, y); ctx.lineTo(x,y); ctx.lineTo(x, y+dy*cs);
    ctx.stroke();
  });
  ctx.shadowBlur = 0;

  // Rule of thirds
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 0.8;
  for (let i=1;i<=2;i++){
    ctx.beginPath(); ctx.moveTo(bX+bW*i/3,bY); ctx.lineTo(bX+bW*i/3,bY+bH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bX,bY+bH*i/3); ctx.lineTo(bX+bW,bY+bH*i/3); ctx.stroke();
  }

  // Center cross
  const cx=bX+bW/2, cy=bY+bH/2, cl=10;
  ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx-cl,cy); ctx.lineTo(cx+cl,cy); ctx.moveTo(cx,cy-cl); ctx.lineTo(cx,cy+cl); ctx.stroke();

  // Label
  ctx.fillStyle = clipped ? 'rgba(255,90,90,0.85)' : 'rgba(90,172,255,0.75)';
  ctx.font = '11px "DM Mono", monospace';
  ctx.textAlign = 'center';
  const lbl = clipped ? `${tHFov.toFixed(1)}° — 画角がカメラより広い` : `${tHFov.toFixed(1)}°  ${ar}`;
  ctx.fillText(lbl, bX+bW/2, bY-9);
}

// Init
updateFill();
calc();
</script>
</body>
</html>
